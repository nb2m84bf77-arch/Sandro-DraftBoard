<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draft Board Sandro</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e1116;
  --panel:#151a21;
  --panel-head:#1a2028;
  --line:#2a313b;
  --line-soft:#222831;
  --text:#e6e9ee;
  --muted:#8b93a1;
  --taken:#3a1b1e;
  --taken-border:#e5484d;
  --taken-text:#f2a0a4;
  --mine:#16301d;
  --mine-border:#46a758;
  --mine-text:#9fd8ac;
  --star:#16232f;
  --star-tint:#7aa5d8;
  --cross:#2d2114;
  --cross-tint:#e8a268;
  --tier:#5b7ea8;
  --accent:#5b7ea8;
  --gold:#f2d15c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:13px}
body{padding:18px 20px 60px;-webkit-touch-callout:none}

.page{width:fit-content;max-width:100%}

h1{
  font-family:"Oswald",sans-serif;font-weight:600;font-size:22px;
  letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;
  display:flex;align-items:baseline;gap:10px;
}
h1 .brand{
  font-size:12px;letter-spacing:.28em;color:var(--star-tint);font-weight:500;
  border:1px solid rgba(122,165,216,.4);border-radius:4px;padding:2px 8px 1px;
}
h1 .hball{
  font-size:18px;display:inline-block;
  animation:hball-bounce 2.6s ease-in-out infinite;
  transform-origin:50% 90%;
}
@keyframes hball-bounce{
  0%,100%{transform:translateY(0) rotate(-12deg)}
  20%{transform:translateY(-7px) rotate(14deg)}
  40%{transform:translateY(0) rotate(-8deg)}
  55%{transform:translateY(-3px) rotate(10deg)}
  70%{transform:translateY(0) rotate(-12deg)}
}
@media (prefers-reduced-motion:reduce){ h1 .hball{animation:none} }

/* ---------- Hauptraster ---------- */
.board{
  display:grid;
  grid-template-columns:200px 165px 185px 185px;
  gap:14px;
  align-items:start;
  justify-content:start;
}
.col{display:flex;flex-direction:column;gap:14px}

.block{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  overflow:hidden;
}
.block-head{
  font-family:"Oswald",sans-serif;font-weight:500;font-size:12px;
  letter-spacing:.16em;text-transform:uppercase;
  padding:8px 12px;background:var(--panel-head);
  border-bottom:1px solid var(--line);
  color:var(--muted);
  display:flex;justify-content:space-between;align-items:center;
}
.block-head b{color:var(--text);font-weight:500}

/* ---------- Spielerzeilen ---------- */
.rows{display:flex;flex-direction:column}
.row{
  display:flex;align-items:center;gap:8px;
  padding:4px 8px 4px 0;
  border-bottom:1px solid var(--line-soft);
  cursor:pointer;
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
  min-height:28px;
  position:relative;
  transition:background .1s;
}
.row:last-child{border-bottom:none}
.row:hover{background:#1b212a}
.row .num{
  font-family:"Oswald",sans-serif;
  color:var(--muted);font-size:11px;
  min-width:30px;text-align:right;
  padding:5px 7px 5px 0;
  border-right:1px solid var(--line-soft);
  align-self:stretch;display:flex;align-items:center;justify-content:flex-end;
}
.row .name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .posrank{
  font-family:"Oswald",sans-serif;font-size:11px;letter-spacing:.05em;
  color:var(--muted);min-width:40px;
  border-left:1px solid var(--line-soft);
  align-self:stretch;display:flex;align-items:center;
  padding-left:8px;
}
.row .mark{font-size:11px;line-height:1;margin-left:auto;padding-right:4px}

/* Status */
.row.taken{background:var(--taken)}
.row.taken .name,.row.taken .posrank{color:var(--taken-text);text-decoration:line-through;text-decoration-color:#a35056}
.row.taken .num{color:var(--taken-text)}
.row.taken:hover{background:#462226}
.row.mine{background:var(--mine)}
.row.mine .name{color:var(--mine-text);font-weight:600}
.row.mine .num,.row.mine .posrank{color:#6fae7d}
.row.mine:hover{background:#1c3a24}
.row.m-star:not(.taken):not(.mine){background:var(--star)}
.row.m-cross:not(.taken):not(.mine){background:var(--cross)}
.row .mark.star{color:var(--star-tint)}
.row .mark.cross{color:var(--cross-tint)}

/* Tier-Rahmen */
.row.t-in{border-left:2px solid var(--tier);border-right:2px solid var(--tier)}
.row.t-start{border-top:2px solid var(--tier)}
.row.t-end{border-bottom:2px solid var(--tier)}

/* Drag & Drop */
.row.drag-src{opacity:.35}
.row.drop-before{box-shadow:inset 0 2px 0 0 var(--accent)}
.row.drop-after{box-shadow:inset 0 -2px 0 0 var(--accent)}
.drag-ghost{
  position:fixed;z-index:70;pointer-events:none;opacity:.9;
  background:#1e2630;border:1px solid var(--accent);border-radius:6px;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
}

/* ---------- Roster ---------- */
.slot{
  display:flex;align-items:center;gap:10px;
  padding:5px 12px;border-bottom:1px solid var(--line-soft);
  min-height:29px;
}
.slot:last-child{border-bottom:none}
.slot .pos{
  font-family:"Oswald",sans-serif;font-size:11px;font-weight:500;
  letter-spacing:.08em;color:var(--muted);
  min-width:34px;text-align:center;
  background:#1e242d;border:1px solid var(--line);
  border-radius:4px;padding:2px 0;
}
.slot .player{flex:1;color:var(--muted);font-style:italic}
.slot.filled .player{color:var(--mine-text);font-style:normal;font-weight:500}
.slot.disabled{opacity:.32}

/* ---------- Einstellungen ---------- */
.settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px 12px}
.setting{display:flex;flex-direction:column;gap:3px}
.setting label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.setting input{
  background:#0f1319;border:1px solid var(--line);border-radius:4px;
  color:var(--text);padding:4px 6px;font-family:"Oswald",sans-serif;font-size:13px;
  width:100%;text-align:center;
}
.setting input:focus{outline:none;border-color:var(--accent)}

/* ---------- Tier-Leiste ---------- */
.tierbar{
  margin-top:14px;
  background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:10px 12px;
  display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;
}
.tiergroup{display:flex;align-items:flex-end;gap:5px}
.tiergroup .tg-label{
  font-family:"Oswald",sans-serif;font-size:12px;letter-spacing:.12em;
  color:var(--muted);margin-right:4px;padding-bottom:5px;
}
.tierfield{display:flex;flex-direction:column;align-items:center;gap:2px}
.tierfield span{font-size:9px;color:var(--muted)}
.tierfield input{
  width:48px;background:#0f1319;border:1px solid var(--line);border-radius:4px;
  color:var(--text);padding:4px 2px;text-align:center;font-size:12px;
}
.tierfield input:focus{outline:none;border-color:var(--tier)}
.tierbar .spacer{flex:1}
button.reset{
  background:#2a1416;border:1px solid var(--taken-border);color:#f2a0a4;
  border-radius:6px;padding:8px 16px;cursor:pointer;
  font-family:"Oswald",sans-serif;letter-spacing:.1em;font-size:12px;text-transform:uppercase;
  touch-action:manipulation;
}
button.reset:hover{background:#3a1b1e}

/* ---------- BigBoard ---------- */
.bigboard-wrap{margin-top:14px}
.bigboard-cols{display:grid;grid-template-columns:repeat(3,1fr)}
.bigboard-cols .rows{border-right:1px solid var(--line);min-width:0}
.bigboard-cols .rows:last-child{border-right:none}
.bigboard-wrap .row .num{min-width:34px}
.pos-QB{color:#b08be0}
.pos-RB{color:#5fb8a5}
.pos-WR{color:#d9b35f}
.pos-TE{color:#7aa5d8}
.row.taken .posrank.pos-QB,.row.taken .posrank.pos-RB,
.row.taken .posrank.pos-WR,.row.taken .posrank.pos-TE{color:var(--taken-text)}

/* ---------- Long-Press-Menü ---------- */
#ctx{
  position:fixed;z-index:80;display:none;
  background:#1c232d;border:1px solid var(--line);border-radius:8px;
  box-shadow:0 6px 24px rgba(0,0,0,.5);
  padding:6px;gap:6px;
}
#ctx.open{display:flex}
#ctx button{
  width:44px;height:40px;border-radius:6px;border:1px solid var(--line);
  background:#12161d;cursor:pointer;font-size:16px;line-height:1;
  touch-action:manipulation;
}
#ctx button.b-star{color:var(--star-tint)}
#ctx button.b-cross{color:var(--cross-tint)}
#ctx button:hover{background:#232b36}
#ctx button.active{border-color:currentColor}

#toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%);
  background:#1c232d;border:1px solid var(--line);color:var(--text);
  padding:8px 16px;border-radius:8px;font-size:12px;
  opacity:0;pointer-events:none;transition:opacity .2s;z-index:90;
}
#toast.show{opacity:1}

/* ---------- Field-Goal-Minigame ---------- */
.fg-wrap{margin-top:14px}
.fg-count{
  font-family:"Oswald",sans-serif;font-size:14px;color:var(--gold);letter-spacing:.08em;
}
#fgField{
  position:relative;height:110px;overflow:hidden;
  background:linear-gradient(180deg,#14351f 0%,#0f2c19 100%);
  touch-action:none;
}
.yard{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.09)}
#fgPost{position:absolute;right:64px;top:0;bottom:0;width:10px}
#fgPost .upright{position:absolute;top:6px;bottom:34px;width:4px;background:var(--gold);border-radius:2px}
#fgPost .upright.l{left:-14px}
#fgPost .upright.r{right:-14px}
#fgPost .crossbar{position:absolute;bottom:34px;left:-14px;right:-14px;height:4px;background:var(--gold);border-radius:2px}
#fgPost .base{position:absolute;bottom:8px;left:50%;width:4px;height:26px;background:#d9b94e;transform:translateX(-50%);border-radius:2px}
#fgBall{
  position:absolute;top:50%;left:14px;
  font-size:30px;line-height:1;cursor:grab;user-select:none;-webkit-user-select:none;
  filter:drop-shadow(0 3px 4px rgba(0,0,0,.5));
  will-change:left,transform;
}
#fgBall.dragging{cursor:grabbing}
.confetti{
  position:absolute;width:7px;height:11px;z-index:5;pointer-events:none;
  animation:confetti-fall 1.3s ease-out forwards;
}
@keyframes confetti-fall{
  0%{opacity:1;transform:translate(0,0) rotate(0deg)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--rot))}
}

@media (max-width:900px){
  .page{width:auto}
  .board{grid-template-columns:1fr 1fr;justify-content:stretch}
  .bigboard-cols{grid-template-columns:1fr}
  .bigboard-cols .rows{border-right:none}
}
@media (max-width:560px){
  .board{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="page">

<h1>Draft Board <span class="brand">Sandro</span> <span class="hball">&#127944;</span></h1>

<div class="board">
  <!-- Spalte 1: Roster + Einstellungen -->
  <div class="col">
    <div class="block">
      <div class="block-head"><b>Roster</b></div>
      <div class="rows" id="roster"></div>
    </div>
    <div class="block">
      <div class="block-head">Roster anpassen</div>
      <div class="settings-grid" id="rosterSettings"></div>
    </div>
    <div class="block">
      <div class="block-head">Listen anpassen</div>
      <div class="settings-grid" id="listSettings"></div>
    </div>
  </div>

  <!-- Spalte 2: QB + TE gestapelt -->
  <div class="col">
    <div class="block">
      <div class="block-head"><b>QB</b></div>
      <div class="rows drag-list" id="list-QB"></div>
    </div>
    <div class="block">
      <div class="block-head"><b>TE</b></div>
      <div class="rows drag-list" id="list-TE"></div>
    </div>
  </div>

  <!-- Spalte 3: RB -->
  <div class="col">
    <div class="block">
      <div class="block-head"><b>RB</b></div>
      <div class="rows drag-list" id="list-RB"></div>
    </div>
  </div>

  <!-- Spalte 4: WR -->
  <div class="col">
    <div class="block">
      <div class="block-head"><b>WR</b></div>
      <div class="rows drag-list" id="list-WR"></div>
    </div>
  </div>
</div>

<!-- Tier-Leiste -->
<div class="tierbar" id="tierbar"></div>

<!-- BigBoard -->
<div class="block bigboard-wrap">
  <div class="block-head"><b>BigBoard</b><span id="bbCount"></span></div>
  <div class="bigboard-cols" id="bigboard"></div>
</div>

<!-- Field-Goal-Minigame -->
<div class="block fg-wrap">
  <div class="block-head"><b>Field Goal</b><span class="fg-count">FG: <span id="fgCount">0</span></span></div>
  <div id="fgField">
    <div id="fgPost">
      <div class="upright l"></div>
      <div class="upright r"></div>
      <div class="crossbar"></div>
      <div class="base"></div>
    </div>
    <div id="fgBall">&#127944;</div>
  </div>
</div>

</div><!-- /page -->

<!-- Long-Press-Menü -->
<div id="ctx">
  <button class="b-star" title="My Guy markieren">&#9733;</button>
  <button class="b-cross" title="Vermeiden markieren">&#10005;</button>
</div>

<div id="toast"></div>

<script>
/* =========================================================
   SOUND — kleine WebAudio-Synth-Klicks
========================================================= */
let audioCtx = null;
function ensureAudio(){
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  }
  if(audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
function tone(f0, f1, dur, type, vol, delay){
  if(!audioCtx) return;
  const t0 = audioCtx.currentTime + (delay||0);
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || "sine";
  o.frequency.setValueAtTime(f0, t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1,1), t0+dur);
  g.gain.setValueAtTime(vol||0.07, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}
const sfx = {
  taken(){ tone(240,110,0.09,"square",0.05); },
  untaken(){ tone(180,300,0.07,"sine",0.045); },
  mine(){ tone(440,440,0.07,"sine",0.06); tone(660,660,0.10,"sine",0.06,0.08); },
  unmine(){ tone(500,260,0.10,"sine",0.05); },
  clear(){ tone(330,330,0.05,"triangle",0.04); },
  mark(){ tone(560,700,0.05,"triangle",0.05); },
  drop(){ tone(300,380,0.06,"sine",0.05); },
  full(){ tone(200,140,0.15,"sawtooth",0.04); },
  kick(){ tone(140,90,0.12,"square",0.07); },
  score(){ tone(523,523,0.10,"sine",0.07); tone(659,659,0.10,"sine",0.07,0.10); tone(784,784,0.18,"sine",0.07,0.20); },
  miss(){ tone(220,120,0.25,"sine",0.05); }
};
document.addEventListener("pointerdown", ensureAudio, {capture:true});

/* =========================================================
   DATEN — Spielerpool wird aus den Listengrößen erzeugt.
   IDs: "QB1", "RB12" ... -> Später echte Namen einpflegen.
========================================================= */
const POSITIONS = ["QB","RB","WR","TE"];
let playersById = {};

function buildPlayers(sizes){
  playersById = {};
  for(const pos of POSITIONS){
    for(let n=1; n<=sizes[pos]; n++){
      const id = pos+n;
      playersById[id] = {id, pos, name: pos+" "+n};
    }
  }
}
function defaultOrderFor(sizes){
  const PATTERN = ["RB","WR","QB","RB","WR","TE"];
  const counts = {QB:0,RB:0,WR:0,TE:0};
  const total = POSITIONS.reduce((s,p)=>s+sizes[p],0);
  const order = [];
  let i = 0;
  while(order.length < total){
    let pos = PATTERN[i % 6]; i++;
    if(counts[pos] >= sizes[pos]){
      pos = POSITIONS.find(p=>counts[p] < sizes[p]);
      if(!pos) break;
    }
    counts[pos]++;
    order.push(pos+counts[pos]);
  }
  return order;
}

/* =========================================================
   STATE
========================================================= */
const TIER_COUNT = {QB:3,RB:7,WR:7,TE:3};
let state = {
  listSizes:{QB:19,RB:40,WR:40,TE:19},
  order:[],
  status:{},
  mark:{},
  picks:[],
  tiers:{QB:[],RB:[],WR:[],TE:[]},
  roster:{QB:1,RB:2,WR:2,FLEX:1,TE:1,BENCH:5}
};
let fgCount = 0;

function save(){
  try{ localStorage.setItem("draftboard_v2", JSON.stringify(state)); }catch(e){}
}
function saveFG(){
  try{ localStorage.setItem("draftboard_fg", String(fgCount)); }catch(e){}
}
function load(){
  try{
    const raw = localStorage.getItem("draftboard_v2");
    if(raw) state = Object.assign(state, JSON.parse(raw));
    const fg = localStorage.getItem("draftboard_fg");
    if(fg) fgCount = parseInt(fg)||0;
  }catch(e){}
}

/* Order mit Spielerpool abgleichen (nach Größenänderung) */
function reconcileOrder(){
  const valid = new Set(Object.keys(playersById));
  state.order = state.order.filter(id=>valid.has(id));
  const inOrder = new Set(state.order);
  const missing = Object.keys(playersById).filter(id=>!inOrder.has(id));
  missing.sort((a,b)=>{
    const pa = playersById[a], pb = playersById[b];
    const na = parseInt(a.replace(pa.pos,"")), nb = parseInt(b.replace(pb.pos,""));
    return na - nb || POSITIONS.indexOf(pa.pos) - POSITIONS.indexOf(pb.pos);
  });
  state.order.push(...missing);
  for(const id of Object.keys(state.status)) if(!valid.has(id)) delete state.status[id];
  for(const id of Object.keys(state.mark))   if(!valid.has(id)) delete state.mark[id];
  state.picks = state.picks.filter(id=>valid.has(id));
}

load();
buildPlayers(state.listSizes);
if(!Array.isArray(state.order) || state.order.length === 0){
  state.order = defaultOrderFor(state.listSizes);
}
reconcileOrder();

/* Abgeleitete Ränge */
let ranks = {};
let posLists = {QB:[],RB:[],WR:[],TE:[]};
function computeRanks(){
  ranks = {}; posLists = {QB:[],RB:[],WR:[],TE:[]};
  const counts = {QB:0,RB:0,WR:0,TE:0};
  state.order.forEach((id, idx)=>{
    const p = playersById[id];
    counts[p.pos]++;
    ranks[id] = {overall:idx+1, posRank:counts[p.pos]};
    posLists[p.pos].push(p);
  });
}

/* =========================================================
   ROSTER-LOGIK
========================================================= */
function buildSlots(){
  const r = state.roster, slots = [];
  for(let i=0;i<r.QB;i++)    slots.push({label:"QB",  type:"QB"});
  for(let i=0;i<r.RB;i++)    slots.push({label:"RB",  type:"RB"});
  for(let i=0;i<r.WR;i++)    slots.push({label:"WR",  type:"WR"});
  for(let i=0;i<r.FLEX;i++)  slots.push({label:"W/R", type:"FLEX"});
  for(let i=0;i<r.TE;i++)    slots.push({label:"TE",  type:"TE"});
  slots.push({label:"D", type:"D", disabled:true});
  slots.push({label:"K", type:"K", disabled:true});
  for(let i=0;i<r.BENCH;i++) slots.push({label:"B",   type:"BENCH"});
  return slots;
}
function rosterCapacity(){
  const r = state.roster;
  return r.QB + r.RB + r.WR + r.FLEX + r.TE + r.BENCH;
}
function assignPicks(slots){
  slots.forEach(s=>s.player=null);
  state.picks.forEach(id=>{
    const p = playersById[id];
    if(!p) return;
    let slot = slots.find(s=>!s.player && !s.disabled && s.type===p.pos);
    if(!slot && (p.pos==="RB"||p.pos==="WR"))
      slot = slots.find(s=>!s.player && s.type==="FLEX");
    if(!slot)
      slot = slots.find(s=>!s.player && s.type==="BENCH");
    if(slot) slot.player = p;
  });
  return slots;
}

/* =========================================================
   RENDERING
========================================================= */
function rowHTML(p, mode){
  const st = state.status[p.id] || "";
  const mk = state.mark[p.id] || "";
  const r = ranks[p.id];
  let cls = "row";
  if(st) cls += " "+st;
  if(mk) cls += " m-"+mk;
  if(mode==="pos"){
    const t = tierClass(p);
    if(t) cls += " "+t;
  }
  const markIcon = mk ? '<span class="mark '+mk+'">'+(mk==="star"?"\u2605":"\u2715")+'</span>' : "";
  if(mode==="pos"){
    return '<div class="'+cls+'" data-id="'+p.id+'">'+
      '<span class="num">'+r.posRank+'</span>'+
      '<span class="name">'+p.name+'</span>'+markIcon+'</div>';
  }
  return '<div class="'+cls+'" data-id="'+p.id+'">'+
    '<span class="num">'+r.overall+'</span>'+
    '<span class="name">'+p.name+'</span>'+markIcon+
    '<span class="posrank pos-'+p.pos+'">'+p.pos+r.posRank+'</span></div>';
}

let parsedTiers = {QB:[],RB:[],WR:[],TE:[]};
function parseTiers(){
  for(const pos of POSITIONS){
    parsedTiers[pos] = [];
    (state.tiers[pos]||[]).forEach(v=>{
      const m = /^\s*(\d+)\s*[-\u2013]\s*(\d+)\s*$/.exec(v||"");
      if(m){
        const a=+m[1], b=+m[2];
        if(a>=1 && b>=a) parsedTiers[pos].push([a,b]);
      }
    });
  }
}
function tierClass(p){
  const pr = ranks[p.id].posRank;
  for(const [a,b] of parsedTiers[p.pos]){
    if(pr>=a && pr<=b){
      let c = "t-in";
      if(pr===a) c += " t-start";
      if(pr===b) c += " t-end";
      return c;
    }
  }
  return "";
}

function renderLists(){
  computeRanks();
  parseTiers();
  for(const pos of POSITIONS){
    document.getElementById("list-"+pos).innerHTML =
      posLists[pos].map(p=>rowHTML(p,"pos")).join("");
  }
  const all = state.order.map(id=>playersById[id]);
  const per = Math.ceil(all.length/3);
  const cols = [all.slice(0,per), all.slice(per,per*2), all.slice(per*2)];
  document.getElementById("bigboard").innerHTML =
    cols.map(c=>'<div class="rows drag-list" data-ov="1">'+c.map(p=>rowHTML(p,"ov")).join("")+'</div>').join("");
  document.getElementById("bbCount").textContent = "1 \u2013 " + all.length;
}

function renderRoster(){
  const slots = assignPicks(buildSlots());
  document.getElementById("roster").innerHTML = slots.map(s=>{
    let cls = "slot";
    if(s.disabled) cls += " disabled";
    if(s.player) cls += " filled";
    const txt = s.disabled ? "\u2014" : (s.player ? s.player.name : "leer");
    return '<div class="'+cls+'"><span class="pos">'+s.label+'</span>'+
           '<span class="player">'+txt+'</span></div>';
  }).join("");
}

function renderRosterSettings(){
  const defs = [["QB","QB"],["RB","RB"],["WR","WR"],["FLEX","W/R"],["TE","TE"],["BENCH","Bench"]];
  document.getElementById("rosterSettings").innerHTML = defs.map(function(d){
    return '<div class="setting"><label>'+d[1]+'</label>'+
    '<input type="number" min="0" max="9" data-rkey="'+d[0]+'" value="'+state.roster[d[0]]+'"></div>';
  }).join("");
  document.querySelectorAll("#rosterSettings input").forEach(inp=>{
    inp.addEventListener("change",()=>{
      const v = Math.max(0, Math.min(9, parseInt(inp.value)||0));
      inp.value = v;
      state.roster[inp.dataset.rkey] = v;
      renderRoster(); save();
    });
  });
}

function renderListSettings(){
  document.getElementById("listSettings").innerHTML = POSITIONS.map(pos=>
    '<div class="setting"><label>'+pos+'</label>'+
    '<input type="number" min="1" max="80" data-lkey="'+pos+'" value="'+state.listSizes[pos]+'"></div>'
  ).join("");
  document.querySelectorAll("#listSettings input").forEach(inp=>{
    inp.addEventListener("change",()=>{
      const v = Math.max(1, Math.min(80, parseInt(inp.value)||1));
      inp.value = v;
      state.listSizes[inp.dataset.lkey] = v;
      buildPlayers(state.listSizes);
      reconcileOrder();
      renderAll(); save();
    });
  });
}

function renderTierbar(){
  const bar = document.getElementById("tierbar");
  let html = "";
  for(const pos of POSITIONS){
    html += '<div class="tiergroup"><span class="tg-label">'+pos+'</span>';
    for(let i=0;i<TIER_COUNT[pos];i++){
      const val = (state.tiers[pos] && state.tiers[pos][i]) || "";
      html += '<div class="tierfield"><span>T'+(i+1)+'</span>'+
        '<input type="text" inputmode="numeric" placeholder="1-5" data-pos="'+pos+'" data-i="'+i+'" value="'+val+'"></div>';
    }
    html += '</div>';
  }
  html += '<div class="spacer"></div><button class="reset" id="resetBtn">Draft zur\u00fccksetzen</button>';
  bar.innerHTML = html;

  bar.querySelectorAll("input").forEach(inp=>{
    inp.addEventListener("change",()=>{
      const pos = inp.dataset.pos, i = +inp.dataset.i;
      if(!state.tiers[pos]) state.tiers[pos]=[];
      state.tiers[pos][i] = inp.value.trim();
      renderLists(); save();
    });
  });
  document.getElementById("resetBtn").addEventListener("click",()=>{
    if(!confirm("Alle Markierungen und Picks zur\u00fccksetzen? (Reihenfolge, Tiers und FG-Counter bleiben)")) return;
    state.status={}; state.mark={}; state.picks=[];
    renderAll(); save();
  });
}

function renderAll(){
  renderLists();
  renderRoster();
}

let toastTimer = null;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 1800);
}

/* =========================================================
   INTERAKTION
   1x Tipp   -> rot / zurueck
   2x Tipp   -> gruen + Roster (wenn Platz)
   3x Tipp   -> komplett zuruecksetzen (grau)
   Halten    -> Menue Stern/Kreuz
   Halten + Ziehen -> Spieler verschieben (Ranking aendern)
========================================================= */
const ctx = document.getElementById("ctx");
let ctxTarget = null;
let pressTimer = null, longPressed = false;
let clickTimer = null, clickCount = 0, clickId = null;
let drag = null;
let press = null;
let autoScroll = null;

function setStatus(id, st){
  if(st) state.status[id] = st; else delete state.status[id];
}
function removePick(id){
  state.picks = state.picks.filter(x=>x!==id);
}
function singleTap(id){
  const st = state.status[id];
  if(st === "mine") return;
  if(st === "taken"){ setStatus(id, null); sfx.untaken(); }
  else { setStatus(id, "taken"); sfx.taken(); }
  renderAll(); save();
}
function doubleTap(id){
  const st = state.status[id];
  if(st === "mine"){
    setStatus(id, null); removePick(id); sfx.unmine();
  } else {
    if(state.picks.length >= rosterCapacity()){
      toast("Roster ist voll"); sfx.full();
      return;
    }
    setStatus(id, "mine");
    if(!state.picks.includes(id)) state.picks.push(id);
    sfx.mine();
  }
  renderAll(); save();
}
function tripleTap(id){
  setStatus(id, null); removePick(id); sfx.clear();
  renderAll(); save();
}
function resolveTaps(id, n){
  if(n === 1) singleTap(id);
  else if(n === 2) doubleTap(id);
  else tripleTap(id);
}

/* ---------- Kontextmenue ---------- */
function openCtx(x, y, id){
  ctxTarget = id;
  const mk = state.mark[id];
  ctx.querySelector(".b-star").classList.toggle("active", mk==="star");
  ctx.querySelector(".b-cross").classList.toggle("active", mk==="cross");
  ctx.classList.add("open");
  const w = 104, h = 54;
  ctx.style.left = Math.max(8, Math.min(x - w/2, window.innerWidth - w - 8)) + "px";
  ctx.style.top  = Math.max(8, Math.min(y - h - 14, window.innerHeight - h - 8)) + "px";
}
function closeCtx(){ ctx.classList.remove("open"); ctxTarget = null; }
function toggleMark(kind){
  if(!ctxTarget) return;
  if(state.mark[ctxTarget] === kind) delete state.mark[ctxTarget];
  else state.mark[ctxTarget] = kind;
  sfx.mark();
  closeCtx(); renderAll(); save();
}
ctx.querySelector(".b-star").addEventListener("click", ()=>toggleMark("star"));
ctx.querySelector(".b-cross").addEventListener("click", ()=>toggleMark("cross"));
document.addEventListener("pointerdown",(e)=>{
  if(ctx.classList.contains("open") && !ctx.contains(e.target)) closeCtx();
});

/* ---------- Drag & Drop ---------- */
function startDrag(e){
  closeCtx();
  const row = press.row;
  const p = playersById[press.id];
  const rect = row.getBoundingClientRect();
  const ghost = row.cloneNode(true);
  ghost.classList.add("drag-ghost");
  ghost.classList.remove("drop-before","drop-after");
  ghost.style.width = rect.width + "px";
  document.body.appendChild(ghost);
  row.classList.add("drag-src");
  drag = {
    id: press.id,
    pos: p.pos,
    ov: press.container.dataset.ov === "1",
    ghost, srcRow: row,
    offX: e.clientX - rect.left,
    offY: e.clientY - rect.top,
    lastY: e.clientY,
    target: null
  };
  moveGhost(e);
  autoScroll = setInterval(()=>{
    if(!drag) return;
    if(drag.lastY < 70) window.scrollBy(0,-12);
    else if(drag.lastY > window.innerHeight - 70) window.scrollBy(0,12);
  }, 16);
}
function moveGhost(e){
  drag.ghost.style.left = (e.clientX - drag.offX) + "px";
  drag.ghost.style.top  = (e.clientY - drag.offY) + "px";
  drag.lastY = e.clientY;
}
function clearDropClasses(){
  document.querySelectorAll(".row.drop-before,.row.drop-after")
    .forEach(el=>el.classList.remove("drop-before","drop-after"));
}
function updateDropTarget(e){
  clearDropClasses();
  drag.target = null;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if(!el) return;
  const row = el.closest(".drag-list .row");
  if(!row) return;
  const id = row.dataset.id;
  if(id === drag.id) return;
  const tp = playersById[id];
  if(!drag.ov && tp.pos !== drag.pos) return;
  const targetOv = row.parentElement.dataset.ov === "1";
  if(targetOv !== drag.ov) return;
  const rect = row.getBoundingClientRect();
  const after = e.clientY > rect.top + rect.height/2;
  row.classList.add(after ? "drop-after" : "drop-before");
  drag.target = {refId:id, after:after};
}
function endDrag(){
  clearInterval(autoScroll); autoScroll = null;
  clearDropClasses();
  if(drag.ghost) drag.ghost.remove();
  if(drag.srcRow) drag.srcRow.classList.remove("drag-src");
  const t = drag.target;
  const dragId = drag.id;
  drag = null;
  if(!t) { renderAll(); return; }
  const order = state.order.filter(id=>id!==dragId);
  let idx = order.indexOf(t.refId);
  if(idx < 0){ renderAll(); return; }
  if(t.after) idx++;
  order.splice(idx, 0, dragId);
  state.order = order;
  sfx.drop();
  renderAll(); save();
}

/* ---------- Pointer-Handling ---------- */
function bindRowEvents(container){
  container.addEventListener("pointerdown",(e)=>{
    const row = e.target.closest(".row");
    if(!row) return;
    longPressed = false;
    press = {id:row.dataset.id, row:row, x:e.clientX, y:e.clientY, container:container};
    pressTimer = setTimeout(()=>{
      longPressed = true;
      openCtx(press.x, press.y, press.id);
    }, 450);
  });
  container.addEventListener("contextmenu",(e)=>{
    if(e.target.closest(".row")) e.preventDefault();
  });
  container.addEventListener("click",(e)=>{
    const row = e.target.closest(".row");
    if(!row || longPressed) return;
    const id = row.dataset.id;
    if(clickId !== id){ clickCount = 0; clickId = id; }
    clickCount++;
    clearTimeout(clickTimer);
    if(clickCount >= 3){
      const n = clickCount; clickCount = 0; clickId = null;
      resolveTaps(id, n);
    } else {
      clickTimer = setTimeout(()=>{
        const n = clickCount; clickCount = 0; clickId = null;
        resolveTaps(id, n);
      }, 300);
    }
  });
}

document.addEventListener("pointermove",(e)=>{
  if(!press) return;
  const dx = e.clientX - press.x, dy = e.clientY - press.y;
  const dist = Math.hypot(dx, dy);
  if(!longPressed){
    if(dist > 10) { clearTimeout(pressTimer); press = null; }
    return;
  }
  if(!drag && dist > 8) startDrag(e);
  if(drag){
    moveGhost(e);
    updateDropTarget(e);
  }
});
["pointerup","pointercancel"].forEach(ev=>{
  document.addEventListener(ev, ()=>{
    clearTimeout(pressTimer);
    if(drag) endDrag();
    press = null;
  });
});
document.addEventListener("touchmove",(e)=>{
  if(drag) e.preventDefault();
},{passive:false});

["list-QB","list-TE","list-RB","list-WR"].forEach(id=>{
  bindRowEvents(document.getElementById(id));
});
bindRowEvents(document.getElementById("bigboard"));

/* =========================================================
   FIELD-GOAL-MINIGAME — Flick mit Schwung
========================================================= */
const fgField = document.getElementById("fgField");
const fgBall  = document.getElementById("fgBall");
const fgCountEl = document.getElementById("fgCount");
fgCountEl.textContent = fgCount;

const BALL_START = 14;
const FRICTION = 0.95;
let fgDrag = null;
let fgFlight = null;
let ballX = BALL_START, ballRot = 0;

function setBall(x, rot, arcY){
  ballX = x;
  fgBall.style.left = x + "px";
  fgBall.style.transform = "translateY(calc(-50% - "+(arcY||0)+"px)) rotate("+(rot||0)+"deg)";
}
setBall(BALL_START, 0, 0);

function fgGoalX(){
  const post = document.getElementById("fgPost");
  return post.offsetLeft + post.offsetWidth/2;
}
function dragMaxX(){ return fgField.clientWidth * 0.4; }

fgBall.addEventListener("pointerdown",(e)=>{
  e.preventDefault();
  if(fgFlight) return;
  ensureAudio();
  fgBall.setPointerCapture(e.pointerId);
  fgDrag = {history:[{x:e.clientX, t:performance.now()}], startLeft:ballX, startPointer:e.clientX};
  fgBall.classList.add("dragging");
});
fgBall.addEventListener("pointermove",(e)=>{
  if(!fgDrag) return;
  const now = performance.now();
  fgDrag.history.push({x:e.clientX, t:now});
  if(fgDrag.history.length > 6) fgDrag.history.shift();
  let x = fgDrag.startLeft + (e.clientX - fgDrag.startPointer);
  x = Math.max(4, Math.min(x, dragMaxX()));
  setBall(x, (x-BALL_START)*0.15, 0);
});
["pointerup","pointercancel"].forEach(ev=>{
  fgBall.addEventListener(ev, ()=>{
    if(!fgDrag) return;
    fgBall.classList.remove("dragging");
    const h = fgDrag.history;
    fgDrag = null;
    let v = 0;
    if(h.length >= 2){
      const a = h[0], b = h[h.length-1];
      const dt = b.t - a.t;
      if(dt > 0) v = (b.x - a.x) / dt * 16.7;
    }
    if(v > 8){ sfx.kick(); launchBall(v); }
    else rollBack();
  });
});

function launchBall(v){
  let scored = false;
  const goal = fgGoalX();
  const launchX = ballX;
  function frame(){
    v *= FRICTION;
    let x = ballX + v;
    const progress = Math.min(1, (x - launchX) / Math.max(1,(goal - launchX)));
    const arc = Math.sin(Math.min(progress,1) * Math.PI) * 26;
    setBall(x, ballRot + 24, arc);
    ballRot += 24;
    if(!scored && x + fgBall.offsetWidth/2 >= goal){
      scored = true;
      fgScore();
    }
    if(x > fgField.clientWidth + 40){ fgFlight = null; resetAfter(scored ? 500 : 0); return; }
    if(v < 0.4){
      fgFlight = null;
      if(scored) resetAfter(500);
      else { sfx.miss(); rollBack(); }
      return;
    }
    fgFlight = requestAnimationFrame(frame);
  }
  fgFlight = requestAnimationFrame(frame);
}
function rollBack(){
  const from = ballX;
  const start = performance.now();
  const dur = 450;
  function frame(t){
    const p = Math.min(1, (t-start)/dur);
    const ease = 1 - Math.pow(1-p, 2);
    setBall(from + (BALL_START - from)*ease, ballRot - 14*(1-p), 0);
    if(p < 1) fgFlight = requestAnimationFrame(frame);
    else { fgFlight = null; ballRot = 0; setBall(BALL_START,0,0); }
  }
  fgFlight = requestAnimationFrame(frame);
}
function resetAfter(ms){
  setTimeout(()=>{ ballRot = 0; setBall(BALL_START,0,0); }, ms);
}
function fgScore(){
  fgCount++; fgCountEl.textContent = fgCount; saveFG();
  sfx.score();
  fgConfetti();
  toast("\uD83C\uDFC8 IT'S GOOD!");
}
function fgConfetti(){
  const colors = ["#f2d15c","#e5484d","#46a758","#7aa5d8","#e8a268","#b08be0","#ffffff"];
  const gx = fgGoalX(), gy = 26;
  for(let i=0;i<44;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = (gx - 4 + (Math.random()*36-18)) + "px";
    c.style.top  = gy + "px";
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.setProperty("--dx", (Math.random()*180-90) + "px");
    c.style.setProperty("--dy", (40 + Math.random()*70) + "px");
    c.style.setProperty("--rot", (Math.random()*720-360) + "deg");
    c.style.animationDelay = (Math.random()*0.12)+"s";
    fgField.appendChild(c);
    setTimeout(()=>c.remove(), 1600);
  }
}
(function(){
  for(let i=1;i<=9;i++){
    const y = document.createElement("div");
    y.className = "yard";
    y.style.left = (i*10)+"%";
    fgField.appendChild(y);
  }
})();

/* =========================================================
   INIT
========================================================= */
renderRosterSettings();
renderListSettings();
renderTierbar();
renderAll();

</script>
